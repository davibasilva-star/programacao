<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duelo Giratório - VS Bot</title>
<style>
    body { margin: 0; overflow: hidden; background: #111; }
    canvas { display: block; margin: auto; background: #222; }
    #info {
        position: absolute;
        top: 10px;
        width: 100%;
        text-align: center;
        color: white;
        font-family: Arial;
    }
</style>
</head>
<body>
<div id="info">
    Jogador: W A S D mover | F atirar <br>
    Azul = Bot automático 🤖
</div>
<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

class Player {
    constructor(x, y, color, isBot = false) {
        this.x = x;
        this.y = y;
        this.radius = 20;
        this.color = color;
        this.angle = 0;
        this.direction = 1;
        this.bullets = 6;
        this.reloadTimer = 0;
        this.speed = 3;
        this.lives = 10;
        this.isBot = isBot;
        this.shootCooldown = 0;
    }

    update(target) {
        this.angle += 0.02 * this.direction;

        if (this.bullets < 6) {
            this.reloadTimer++;
            if (this.reloadTimer >= 60) {
                this.bullets++;
                this.reloadTimer = 0;
            }
        }

        if (this.isBot) this.botAI(target);

        this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
        this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
    }

    botAI(target) {
        const dx = target.x - this.x;
        const dy = target.y - this.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        // Movimento simples: segue o jogador
        if (distance > 150) {
            this.x += (dx / distance) * this.speed;
            this.y += (dy / distance) * this.speed;
        } else {
            this.x -= (dx / distance) * this.speed;
            this.y -= (dy / distance) * this.speed;
        }

        // Atira automaticamente
        this.shootCooldown++;
        if (this.shootCooldown > 60) {
            this.shoot();
            this.shootCooldown = 0;
        }
    }

    shoot() {
        if (this.bullets > 0) {
            this.bullets--;
            this.direction *= -1;
            bullets.push(new Bullet(this));
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.fillRect(this.radius, -5, 20, 10);

        ctx.restore();

        ctx.fillStyle = "white";
        ctx.fillText("Vidas: " + this.lives, this.x - 30, this.y - 40);
    }
}

class Bullet {
    constructor(player) {
        this.x = player.x + Math.cos(player.angle) * player.radius;
        this.y = player.y + Math.sin(player.angle) * player.radius;
        this.speed = 6;
        this.angle = player.angle;
        this.radius = 5;
        this.active = true;
        this.owner = player;
    }

    update() {
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;

        if (
            this.x < 0 ||
            this.x > canvas.width ||
            this.y < 0 ||
            this.y > canvas.height
        ) {
            this.active = false;
        }
    }

    draw() {
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
    }
}

const player = new Player(200, 300, "red");
const bot = new Player(600, 300, "blue", true);

let bullets = [];
let keys = {};

function checkCollision(bullet, player) {
    if (bullet.owner === player) return false;

    const dx = bullet.x - player.x;
    const dy = bullet.y - player.y;
    const distance = Math.sqrt(dx * dx + dy * dy);

    return distance < player.radius;
}

function handleMovement() {
    if (keys["w"]) player.y -= player.speed;
    if (keys["s"]) player.y += player.speed;
    if (keys["a"]) player.x -= player.speed;
    if (keys["d"]) player.x += player.speed;
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    handleMovement();

    player.update();
    bot.update(player);

    player.draw();
    bot.draw();

    bullets.forEach((bullet, index) => {
        bullet.update();
        bullet.draw();

        if (checkCollision(bullet, player)) {
            player.lives--;
            bullet.active = false;
        }
        if (checkCollision(bullet, bot)) {
            bot.lives--;
            bullet.active = false;
        }

        if (!bullet.active) bullets.splice(index, 1);
    });

    if (player.lives <= 0) {
        alert("🤖 Bot venceu!");
        document.location.reload();
    }

    if (bot.lives <= 0) {
        alert("🎉 Você venceu!");
        document.location.reload();
    }

    requestAnimationFrame(gameLoop);
}

window.addEventListener("keydown", (e) => {
    keys[e.key.toLowerCase()] = true;
    if (e.key.toLowerCase() === "f") player.shoot();
});

window.addEventListener("keyup", (e) => {
    keys[e.key.toLowerCase()] = false;
});

ctx.font = "16px Arial";
gameLoop();
</script>
</body>
</html>
